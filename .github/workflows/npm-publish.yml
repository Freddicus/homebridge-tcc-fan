# Publishes to npm when a GitHub Release is published.
# Uses npm Trusted Publishing (OIDC) — no stored npm token required.
# Setup: npmjs.com → package → Settings → Publishing → Add trusted publisher
#   Owner: freddicus | Repo: homebridge-tcc-fan | Workflow: npm-publish.yml
# Node 24 ships with npm 11.x natively (required for OIDC trusted publishing).

name: Node.js Package

on:
  release:
    types: [published]

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm ci
      - run: npm test

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
      - run: npm ci
      - run: npm publish
