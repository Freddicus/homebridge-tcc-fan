# Publishes to npm when a GitHub Release is created.
# Uses npm Trusted Publishing (OIDC) — no stored npm token required.
# Setup: npmjs.com → package → Settings → Publishing → Add trusted publisher
#   Owner: Freddicus | Repo: homebridge-tcc-fan | Workflow: npm-publish.yml

name: Node.js Package

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm test

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm publish --provenance --access public
